services:
  db:
    image: mysql:8.0
    container_name: car-rental-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-car_rental}
      MYSQL_USER: ${DB_USER:-car_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-car_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - car-rental-network

  # MAIN WEBSITE BACKEND
  backend:
    image: worknai009/car-rental-backend:latest
    container_name: car-rental-backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-car_user}
      - DB_PASSWORD=${DB_PASSWORD:-car_password}
      - DB_NAME=${DB_NAME:-car_rental}
      - DB_PORT=3306
      - JWT_SECRET=${JWT_SECRET:-car_rental_secret_key_123}
      - JWT_EXPIRE=${JWT_EXPIRE:-24h}
      - MAIN_PORT=${MAIN_PORT:-1000}
      - CLIENT_URL=${CLIENT_URL:-https://aitourism.in,https://admin.aitourism.in}
    depends_on:
      - db
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - car-rental-network

  # MAIN WEBSITE FRONTEND
  frontend:
    image: worknai009/car-rental-frontend:latest
    container_name: car-rental-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - car-rental-network

  # ADMIN PANEL BACKEND
  admin-backend:
    image: worknai009/car-rental-admin-backend:latest
    container_name: car-rental-admin-backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-car_user}
      - DB_PASSWORD=${DB_PASSWORD:-car_password}
      - DB_NAME=${DB_NAME:-car_rental}
      - DB_PORT=3306
      - JWT_SECRET=${JWT_SECRET:-car_rental_secret_key_123}
      - JWT_EXPIRE=${JWT_EXPIRE:-24h}
      - ADMIN_PORT=${ADMIN_PORT:-1001}
      - CLIENT_URL=${CLIENT_URL:-https://aitourism.in,https://admin.aitourism.in}
    depends_on:
      - db
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - car-rental-network

  # ADMIN PANEL FRONTEND
  admin-frontend:
    image: worknai009/car-rental-admin-frontend:latest
    container_name: car-rental-admin-frontend
    restart: always
    depends_on:
      - admin-backend
    networks:
      - car-rental-network

  # NGINX GATEWAY
  gateway:
    image: nginx:alpine
    container_name: car-rental-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - admin-frontend
      - backend
      - admin-backend
    networks:
      - car-rental-network

  # SSL CERTBOT
  certbot:
    image: certbot/certbot
    container_name: car-rental-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - car-rental-network

networks:
  car-rental-network:
    driver: bridge

volumes:
  db_data:
