name: Car Rental CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. Test & Build
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Test Backend
        run: |
          cd backend && npm install && npm test
          cd ../Admin/backend && npm install

      - name: Build Main Frontend
        run: |
          cd frontend && npm install && npm run build

      - name: Build Admin Frontend
        run: |
          cd Admin/frontend && npm install && npm run build

  # 2. Push to Docker Hub
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Images
        run: |
          docker build --build-arg VITE_MAIN_API_URL=https://aitourism.in/api --build-arg VITE_GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_KEY }} -t ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-frontend ./frontend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-backend ./backend
          docker build --build-arg VITE_ADMIN_API_URL=https://admin.aitourism.in/api/admin --build-arg VITE_GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_KEY }} -t ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-admin-frontend ./Admin/frontend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-admin-backend ./Admin/backend
          
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-frontend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-backend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-admin-frontend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/car-rental-admin-backend

  # 3. Deploy to VPS
  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    steps:
      - uses: actions/checkout@v4

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/car-rental
            # Pull latest images using Docker Hub username
            DOCKER_USER=${{ secrets.DOCKER_HUB_USERNAME }}
            docker pull $DOCKER_USER/car-rental-frontend
            docker pull $DOCKER_USER/car-rental-backend
            docker pull $DOCKER_USER/car-rental-admin-frontend
            docker pull $DOCKER_USER/car-rental-admin-backend
            
            # Restart with updated images
            docker compose down
            docker compose up -d
            docker image prune -f
