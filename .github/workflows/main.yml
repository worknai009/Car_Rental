name: Car Rental CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and test Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm install

      - name: Run Lint (Optional)
        # only if npm lint is configured 
        working-directory: backend
        run: |
          if npm run | grep -q 'lint'; then
            npm run lint
          else
            echo "Lint script not found, skipping."
          fi

  # Job 2: Build frontend to ensure no build errors
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm install

      - name: Test Build (Vite)
        working-directory: frontend
        run: npm run build

  # Job 3: Build Docker Images 
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t car-rental-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_API_URL=http://localhost:1000/api \
            -t car-rental-frontend:latest ./frontend
