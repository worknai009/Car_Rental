# Default block to reject direct IP access
server {
    listen 80 default_server;
    server_name _;
    return 403;
}

# Main Website (aitourism.in)
server {
    listen 80;
    server_name aitourism.in www.aitourism.in;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Admin Panel (admin.aitourism.in)
server {
    listen 80;
    server_name admin.aitourism.in;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Configuration for Main Website
server {
    listen 443 ssl;
    server_name aitourism.in www.aitourism.in;

    ssl_certificate /etc/letsencrypt/live/aitourism.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aitourism.in/privkey.pem;

    # Main Website Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main Website Backend API
    location /api/ {
        proxy_pass http://backend:1000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public static files (Uploads)
    location /api/public/ {
        proxy_pass http://backend:1000/api/public/;
    }
}

# HTTPS Configuration for Admin Panel
server {
    listen 443 ssl;
    server_name admin.aitourism.in;

    ssl_certificate /etc/letsencrypt/live/aitourism.in/fullchain.pem; # Valid if using wildcard or multi-domain cert
    ssl_certificate_key /etc/letsencrypt/live/aitourism.in/privkey.pem;

    # Admin Panel Frontend
    location / {
        proxy_pass http://admin-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Panel Backend API
    location /api/admin/ {
        proxy_pass http://admin-backend:1001/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
